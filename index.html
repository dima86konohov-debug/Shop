<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Обуви</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Каталог обуви</h2>
        
        <!-- Сюда товары подгружаются из JSON автоматически -->
        <div id="catalog"></div>

        <!-- Кнопка оформления заказа -->
        <button class="order-btn" id="main-action-btn" onclick="sendOrder()">Оформить заказ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        let selectedSize = null;
        let selectedProduct = null;

        // Генерация карточек товаров на экране
        function renderCatalog(products) {
            const catalogDiv = document.getElementById('catalog');
            catalogDiv.innerHTML = ''; 

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'shoe-card';
                
                let sizeButtons = '';
                product.sizes.forEach(size => {
                    sizeButtons += `<button class="size-btn" onclick="selectSize(this, ${size}, '${product.title}', ${product.price})">${size}</button>`;
                });

                card.innerHTML = `
                    <img src="${product.image}" alt="${product.title}" class="shoe-img">
                    <div class="shoe-info">
                        <h3 class="shoe-title">${product.title}</h3>
                        <p class="shoe-price">${product.price} BYN</p>
                        <p class="label">Выберите размер:</p>
                        <div class="size-selector">${sizeButtons}</div>
                    </div>
                `;
                catalogDiv.appendChild(card);
            });
        }

        function selectSize(element, size, title, price) {
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            selectedSize = size;
            selectedProduct = { item: title, price: price };
        }

        function sendOrder() {
            if (!selectedSize || !selectedProduct) {
                alert("Пожалуйста, выберите размер обуви перед заказом!");
                return;
            }

            const data = {
                item: selectedProduct.item,
                price: selectedProduct.price,
                size: selectedSize
            };

            tg.sendData(JSON.stringify(data));
            tg.close(); 
        }

        // Загрузка актуального списка товаров с защитой от кэширования
        fetch(`products.json?t=${Date.now()}`)
            .then(response => response.json())
            .then(data => renderCatalog(data))
            .catch(err => console.error("Ошибка загрузки товаров:", err));
    </script>
</body>
</html>

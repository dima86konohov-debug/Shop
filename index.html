<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Обуви</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Каталог обуви</h2>
        
        <div id="catalog"></div>

        <button class="order-btn" id="main-action-btn" onclick="sendOrder()">Оформить заказ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        let selectedSize = null;
        let selectedProduct = null;

        // Генерация карточек товаров на экране
        function renderCatalog(products) {
            const catalogDiv = document.getElementById('catalog');
            catalogDiv.innerHTML = ''; 

            if (!products || products.length === 0) {
                catalogDiv.innerHTML = '<p style="color: red; text-align: center;">Товары не найдены или ошибка загрузки</p>';
                return;
            }

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'shoe-card';
                
                let sizeButtons = '';
                product.sizes.forEach(size => {
                    // Используем JSON.stringify, чтобы безопасно передать имя товара без конфликта кавычек
                    const safeTitle = product.title.replace(/"/g, '&quot;');
                    sizeButtons += `<button class="size-btn" onclick="selectSize(this, ${size}, '${safeTitle}', ${product.price})">${size}</button>`;
                });

                card.innerHTML = `
                    <img src="${product.image}" alt="${product.title}" class="shoe-img" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400'">
                    <div class="shoe-info">
                        <h3 class="shoe-title">${product.title}</h3>
                        <p class="shoe-price">${product.price} BYN</p>
                        <p class="label">Выберите размер:</p>
                        <div class="size-selector">${sizeButtons}</div>
                    </div>
                `;
                catalogDiv.appendChild(card);
            });
        }

        function selectSize(element, size, title, price) {
            // Снимаем активность со всех кнопок размеров на странице
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
            // Делаем активной текущую кнопку
            element.classList.add('active');
            
            selectedSize = size;
            selectedProduct = { item: title, price: price };
        }

        function sendOrder() {
            if (!selectedSize || !selectedProduct) {
                alert("Пожалуйста, выберите размер обуви перед заказом!");
                return;
            }

            const data = {
                item: selectedProduct.item,
                price: Number(selectedProduct.price),
                size: Number(selectedSize)
            };

            tg.sendData(JSON.stringify(data));
            tg.close(); 
        }

        // Загрузка актуального списка товаров с защитой от кэширования браузера
        fetch(`products.json?t=${Date.now()}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Сеть ответила с ошибкой: ' + response.status);
                }
                return response.json();
            })
            .then(data => renderCatalog(data))
            .catch(err => {
                console.error("Ошибка загрузки товаров:", err);
                document.getElementById('catalog').innerHTML = '<p style="color: red; text-align: center;">Ошибка при чтении products.json</p>';
            });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Обуви</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Каталог обуви</h2>
        
        <div class="shoe-card" id="product-1">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="Кроссовки" class="shoe-img">
            <div class="shoe-info">
                <h3 class="shoe-title">Спортивные кроссовки RunFast</h3>
                <p class="shoe-price">180 BYN</p>
                
                <p class="label">Выберите размер:</p>
                <div class="size-selector">
                    <button class="size-btn" onclick="selectSize(this, 40)">40</button>
                    <button class="size-btn" onclick="selectSize(this, 41)">41</button>
                    <button class="size-btn" onclick="selectSize(this, 42)">42</button>
                    <button class="size-btn disabled" disabled>43</button> 
                    <button class="size-btn" onclick="selectSize(this, 44)">44</button>
                </div>
            </div>
        </div>

        <button class="order-btn" id="main-action-btn" onclick="sendOrder()">Оформить заказ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        let selectedSize = null;
        const productInfo = {
            item: "Спортивные кроссовки RunFast",
            price: 180
        };

        function selectSize(element, size) {
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            selectedSize = size;
        }

        function sendOrder() {
            if (!selectedSize) {
                alert("Пожалуйста, выберите размер обуви перед заказом!");
                return;
            }

            // Формируем ТОЧНЫЙ ТЕКСТ, который ждет ваш Python-код в newfile.py
            const orderText = `Заказ в магазине:\n📦 Модель: ${productInfo.item}\n📏 Размер: ${selectedSize}\n💰 Цена: ${productInfo.price} BYN`;
            
            // Ваш точный юзернейм бота
            const botUsername = "shoe_shop_2026_bot"; 

            // Безопасно кодируем текст для ссылки
            const encodedText = encodeURIComponent(orderText);
            
            // Формируем ссылку перехода в чат с текстом
            const targetUrl = `https://t.me/${botUsername}?text=${encodedText}`;

            // Открываем ссылку средствами Telegram. 
            // Это закроет магазин и вставит готовый текст заказа в поле ввода чата бота!
            tg.openTelegramLink(targetUrl);
        }
    </script>
</body>
</html>

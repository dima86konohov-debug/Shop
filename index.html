<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Обуви</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>Каталог обуви</h2>
        
        <div class="shoe-card" id="product-1">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="Кроссовки" class="shoe-img">
            <div class="shoe-info">
                <h3 class="shoe-title">Спортивные кроссовки RunFast</h3>
                <p class="shoe-price">180 BYN</p>
                
                <p class="label">Выберите размер:</p>
                <div class="size-selector">
                    <button class="size-btn" onclick="selectSize(this, 40)">40</button>
                    <button class="size-btn" onclick="selectSize(this, 41)">41</button>
                    <button class="size-btn" onclick="selectSize(this, 42)">42</button>
                    <button class="size-btn" onclick="selectSize(this, 44)">44</button>
                </div>
            </div>
        </div>
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        let selectedSize = null;

        // 1. Показываем системную кнопку Telegram в самом низу экрана
        tg.MainButton.text = "ВЫБЕРИТЕ РАЗМЕР";
        tg.MainButton.show();
        tg.MainButton.disable(); // Отключаем её, пока размер не выбран

        function selectSize(element, size) {
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            selectedSize = size;

            // 2. Включаем системную кнопку, когда размер выбран
            tg.MainButton.text = `ОФОРМИТЬ ЗАКАЗ (Размер ${size})`;
            tg.MainButton.enable();
        }

        // 3. Отправка данных при нажатии на системную кнопку
        tg.MainButton.onClick(function() {
            const data = {
                item: "Спортивные кроссовки RunFast",
                price: 180,
                size: selectedSize
            };
            
            tg.sendData(JSON.stringify(data));
            tg.close();
        });
    </script>
</body>
</html>
